{% extends "main.html" %}

{% block content %}
<!-- Main Section -->
    <main class="formPage my-xl">
        <div class="content-box">
            <div class="formWrapper">
                <a class="backButton" href="{% url 'account' %}"> < <i class="im im-angle-left"></i></a>
                <br>
                <form class="form" method="POST" action="{% url 'create-skill' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <input class="btn btn--main" type="submit" value="Submit" />
                </form>
            </div>
        </div>
    </main>
{% endblock content %}
