<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#00d4ff"/>
    <stop offset="100%" stop-color="#0066ff"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
    <feMerge>
      <feMergeNode in="coloredBlur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- Text -->
<text x="150" y="230" font-family="Segoe UI, Arial, sans-serif"
      font-size="160" font-weight="700"
      fill="url(#grad)" filter="url(#glow)">
  Devix
</text>

<!-- Circuit design -->
<g stroke="url(#grad)" stroke-width="6" fill="none" filter="url(#glow)">
  <line x1="700" y1="150" x2="900" y2="80"/>
  <circle cx="900" cy="80" r="10" fill="url(#grad)"/>

  <line x1="700" y1="200" x2="950" y2="200"/>
  <circle cx="950" cy="200" r="10" fill="url(#grad)"/>

  <line x1="700" y1="250" x2="900" y2="320"/>
  <circle cx="900" cy="320" r="10" fill="url(#grad)"/>
</g>

</svg>
