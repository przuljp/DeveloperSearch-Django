<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="400" viewBox="0 0 1400 400" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4f46e5"/>
    <stop offset="100%" stop-color="#06b6d4"/>
  </linearGradient>
</defs>

<!-- ICON (modern hex + code brackets) -->
<g transform="translate(80,80)">
  <polygon points="100,0 200,60 200,160 100,220 0,160 0,60"
           fill="none" stroke="url(#grad)" stroke-width="10"/>

  <!-- code brackets -->
  <polyline points="70,90 40,110 70,130" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round"/>
  <polyline points="130,90 160,110 130,130" fill="none" stroke="url(#grad)" stroke-width="10" stroke-linecap="round"/>
</g>

<!-- TEXT -->
<text x="350" y="240"
      font-family="Inter, Segoe UI, Arial, sans-serif"
      font-size="180"
      font-weight="700"
      fill="#E5E7EB">
  Devix
</text>

</svg>
