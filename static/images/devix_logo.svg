<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Text -->
  <text x="50" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="80" font-weight="600" fill="url(#grad)">
    Devix
  </text>

  <!-- Circuit lines from X -->
  <g stroke="url(#grad)" stroke-width="4" fill="none">
    <line x1="420" y1="80" x2="520" y2="40"/>
    <circle cx="520" cy="40" r="6" fill="url(#grad)"/>

    <line x1="420" y1="100" x2="550" y2="100"/>
    <circle cx="550" cy="100" r="6" fill="url(#grad)"/>

    <line x1="420" y1="120" x2="520" y2="160"/>
    <circle cx="520" cy="160" r="6" fill="url(#grad)"/>
  </g>
</svg>
